openapi: 3.0.3
info:
  title: Notification Service API
  description: |
    Event-driven notification system delivering messages over SMS, Email,
    and Push channels. Notifications are accepted via this API, queued in
    RabbitMQ, and delivered asynchronously by workers — creation returning
    201 means "accepted for delivery", not "delivered". Track progress by
    polling the resource or (in a later phase) the WebSocket stream.
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local docker compose stack

# The API is intentionally unauthenticated in this assessment scope.
security: []

tags:
  - name: notifications
    description: Create and track notifications
  - name: templates
    description: Reusable message templates with variable substitution
  - name: system
    description: Health and diagnostics

paths:
  /api/v1/notifications:
    post:
      tags: [notifications]
      summary: Create a notification
      description: |
        Validates and persists a notification, then queues it for
        asynchronous delivery. When `scheduled_at` is set the notification
        is stored as `scheduled` and enqueued at the scheduled time
        instead. Exactly one recipient per notification.
      operationId: createNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '201':
          description: Notification accepted for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '200':
          description: Idempotent replay — the idempotency_key matched an existing notification, returned unchanged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: Malformed JSON or failed validation. Every failing field is listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the 1 MiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [notifications]
      summary: List notifications
      description: Newest first, filterable, keyset-paginated via opaque cursor.
      operationId: listNotifications
      parameters:
        - name: limit
          in: query
          required: false
          description: Max results (1-100, default 50).
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Status'
        - name: channel
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Channel'
        - name: batch_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: Created-at lower bound (RFC3339).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Created-at upper bound (RFC3339).
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          required: false
          description: Opaque pagination token from a previous page's next_cursor.
          schema:
            type: string
      responses:
        '200':
          description: Matching notifications.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  next_cursor:
                    type: string
                    description: Pass as cursor for the next page; empty when no more pages.
        '400':
          description: limit is not a positive integer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/notifications/batch:
    post:
      tags: [notifications]
      summary: Create a batch of notifications
      description: |
        Up to MAX_BATCH_SIZE notifications (default 1000) in one request
        under a shared batch_id.
        Partial success: invalid items are rejected per index, duplicate
        idempotency keys are reported with the existing notification's
        ID, and valid items proceed.
      operationId: createNotificationBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notifications]
              properties:
                notifications:
                  type: array
                  # server enforces MAX_BATCH_SIZE (default 1000)
                  maxItems: 1000
                  items:
                    $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '201':
          description: Batch processed; inspect per-item results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    format: uuid
                  accepted:
                    type: integer
                  rejected:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        status:
                          type: string
                          enum: [accepted, rejected, duplicate]
                        notification:
                          $ref: '#/components/schemas/Notification'
                        existing_id:
                          type: string
                          format: uuid
                        errors:
                          type: array
                          items:
                            $ref: '#/components/schemas/FieldError'
        '400':
          description: Malformed body, empty batch, or more items than MAX_BATCH_SIZE allows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the 10 MiB batch limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/notifications/{id}/cancel:
    post:
      tags: [notifications]
      summary: Cancel a notification
      description: |
        Cancels a pending, scheduled, or queued notification. Cancelled
        notifications are never delivered; a message already in the queue
        is dropped when a worker picks it up.
      operationId: cancelNotification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: The id is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No notification with this ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The notification is processing or already terminal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/notifications/{id}:
    get:
      tags: [notifications]
      summary: Get a notification by ID
      description: Returns the full notification resource including delivery state.
      operationId: getNotification
      parameters:
        - name: id
          in: path
          required: true
          description: Notification UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The notification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: The id is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No notification with this ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/templates:
    post:
      tags: [templates]
      summary: Create a message template
      description: |
        Bodies use Go text/template syntax with {{.variable}} placeholders
        and are parse-validated at creation. Templates render into final
        content at enqueue time; notifications keep no reference to them.
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, channel, body]
              properties:
                name:
                  type: string
                  description: URL-safe identifier (lowercase letters, digits, hyphen, underscore).
                  example: otp-code
                channel:
                  $ref: '#/components/schemas/Channel'
                body:
                  type: string
                  example: "Your verification code is {{.code}}."
      responses:
        '201':
          description: Template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Validation failed (name shape, channel, unparseable body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Template name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [templates]
      summary: List templates
      operationId: listTemplates
      responses:
        '200':
          description: All templates, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/templates/{name}:
    get:
      tags: [templates]
      summary: Get a template by name
      operationId: getTemplate
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          description: No template with this name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ws:
    get:
      tags: [system]
      summary: Live status event stream (WebSocket)
      description: |
        Upgrades to a WebSocket. Each frame is a JSON status event:
        {notification_id, status, channel, attempts, last_error?, occurred_at}.
        Optional ?id=<uuid> filters the stream to one notification.
        Events are best-effort and transient; the REST resources remain
        the source of truth.
      operationId: statusStream
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: Switching protocols.

  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      description: Process liveness only; dependency readiness is a separate endpoint.
      operationId: healthz
      responses:
        '200':
          description: Process is alive.

  /api/v1/queues:
    get:
      tags: [system]
      summary: Queue depths
      description: Ready-message counts for work queues, retry tiers, and the DLQ. Mounted only when DASHBOARD_ENABLED.
      operationId: queueDepths
      responses:
        '200':
          description: Per-queue ready counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queues:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        ready: { type: integer }
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/worker:
    get:
      tags: [system]
      summary: Worker pause state
      description: Mounted only when DASHBOARD_ENABLED.
      operationId: getWorkerState
      responses:
        '200':
          description: Current pause state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerState'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [system]
      summary: Pause or resume the worker
      description: Paused workers cancel their queue subscriptions; messages accumulate as ready. Mounted only when DASHBOARD_ENABLED.
      operationId: setWorkerState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerState'
      responses:
        '200':
          description: Applied state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerState'
        '400':
          description: Malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/provider:
    get:
      tags: [system]
      summary: Current delivery provider target
      description: Mounted only when DASHBOARD_ENABLED.
      operationId: getProvider
      responses:
        '200':
          description: Override, configured default, and effective target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderState'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [system]
      summary: Override the delivery provider at runtime
      description: |
        Points the worker at a different provider (e.g. a webhook.site
        URL) without a restart; takes effect within ~2 seconds. An empty
        url resets to the configured default. Mounted only when
        DASHBOARD_ENABLED.
      operationId: setProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  example: https://webhook.site/your-uuid
      responses:
        '200':
          description: Applied state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderState'
        '400':
          description: Not an absolute http(s) URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /provider/messages:
    post:
      tags: [system]
      summary: Built-in mock provider intake
      description: |
        Testing stand-in for the external provider; the worker's default
        PROVIDER_URL in docker compose points here. Content containing
        FAILME returns 500 (retryable); REJECTME returns 400 (permanent).
        Mounted only when DASHBOARD_ENABLED.
      operationId: providerReceive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, channel, content]
              properties:
                to: { type: string }
                channel: { type: string }
                content: { type: string }
      responses:
        '202':
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId: { type: string }
                  status: { type: string, example: accepted }
                  timestamp: { type: string, format: date-time }
        '400':
          description: Malformed request or simulated permanent rejection.
        '500':
          description: Simulated provider outage.

  /api/v1/provider/messages:
    get:
      tags: [system]
      summary: Messages the mock provider received
      description: Newest first, memory-bounded. Mounted only when DASHBOARD_ENABLED.
      operationId: providerMessages
      responses:
        '200':
          description: Received deliveries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        message_id: { type: string }
                        to: { type: string }
                        channel: { type: string }
                        content: { type: string }
                        received_at: { type: string, format: date-time }

components:
  responses:
    InternalError:
      description: Unexpected server error. The correlation ID from the X-Request-ID response header links the error to server logs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Channel:
      type: string
      description: Delivery medium.
      enum: [sms, email, push]

    Priority:
      type: string
      description: Processing priority. Defaults to normal.
      enum: [high, normal, low]

    Status:
      type: string
      description: |
        Notification lifecycle state:
        * `pending` — persisted, not yet handed to the queue
        * `scheduled` — waiting for its future delivery time
        * `queued` — in the message queue awaiting a worker
        * `processing` — a worker is delivering it
        * `retrying` — delivery failed, waiting for the next attempt
        * `sent` — provider accepted the message (terminal)
        * `failed` — delivery exhausted or permanently rejected (terminal)
        * `cancelled` — cancelled before delivery (terminal)
      enum: [pending, scheduled, queued, processing, retrying, sent, failed, cancelled]

    Template:
      type: object
      properties:
        name:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TemplateRef:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: otp-code
        vars:
          type: object
          additionalProperties:
            type: string
          description: Values for every {{.variable}} the template body references.

    CreateNotificationRequest:
      type: object
      required: [recipient, channel]
      description: Exactly one of content or template must be provided.
      properties:
        recipient:
          type: string
          description: |
            Channel-specific address: E.164 phone number for sms
            (e.g. +905551234567), email address for email, device token
            for push.
          example: "+905551234567"
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
          description: |
            Message body. Limits: sms 160 characters, push 512 bytes,
            email 100 KB. Mutually exclusive with template.
          example: "Your order has shipped."
        template:
          $ref: '#/components/schemas/TemplateRef'
        priority:
          $ref: '#/components/schemas/Priority'
        scheduled_at:
          type: string
          format: date-time
          description: Future delivery time. Must be in the future when provided.
        idempotency_key:
          type: string
          description: |
            Client-supplied key preventing duplicate creation on retries.
            Reusing a key returns the original notification with 200
            instead of creating a duplicate.

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batch_id:
          type: string
          format: uuid
          description: Present when created via a batch request.
        recipient:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/Status'
        scheduled_at:
          type: string
          format: date-time
        attempts:
          type: integer
          description: Delivery attempts made so far.
        last_error:
          type: string
          description: Most recent delivery error, if any.
        provider_message_id:
          type: string
          description: Provider-issued message ID once sent.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time

    ProviderState:
      type: object
      properties:
        override:
          type: string
          description: Runtime target; empty when the default applies.
        default:
          type: string
          description: Statically configured PROVIDER_URL.
        effective:
          type: string
          description: What the worker delivers to right now.

    WorkerState:
      type: object
      required: [paused]
      properties:
        paused:
          type: boolean

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: recipient
        message:
          type: string
          example: must be an E.164 phone number, e.g. +905551234567

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: validation failed
        fields:
          type: array
          description: Present on validation failures; one entry per failing field.
          items:
            $ref: '#/components/schemas/FieldError'
