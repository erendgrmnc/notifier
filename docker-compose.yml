services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notifier
      POSTGRES_PASSWORD: notifier
      POSTGRES_DB: notifier
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifier -d notifier"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: notifier
      RABBITMQ_DEFAULT_PASS: notifier
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: notifier:local
    restart: unless-stopped
    environment:
      ROLE: api
      HTTP_PORT: "8081"
      DATABASE_URL: postgres://notifier:notifier@postgres:5432/notifier?sslmode=disable
      RABBITMQ_URL: amqp://notifier:notifier@rabbitmq:5672/
      DASHBOARD_ENABLED: ${DASHBOARD_ENABLED:-true}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    image: notifier:local
    restart: unless-stopped
    environment:
      ROLE: worker
      DATABASE_URL: postgres://notifier:notifier@postgres:5432/notifier?sslmode=disable
      RABBITMQ_URL: amqp://notifier:notifier@rabbitmq:5672/
      # Defaults to the built-in mock provider so the worker delivers
      # over real HTTP out of the box; set your webhook.site URL to go
      # external, or empty to simulate deliveries in logs only.
      PROVIDER_URL: ${PROVIDER_URL:-http://api:8081/provider/messages}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # The default PROVIDER_URL points at the api's mock provider.
      api:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data:
